name: Run fuzzing regression tests

on:
  pull_request:
  push:
  schedule:
    - cron: '0 2 * * 5'  # Every Friday at 2am
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run_fuzzers:
    name: Run fuzzing regression tests
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install Clang 19
      run: |-
        set -x
        source /etc/os-release
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        sudo add-apt-repository "deb https://apt.llvm.org/${UBUNTU_CODENAME}/ llvm-toolchain-${UBUNTU_CODENAME}-19 main"
        sudo apt-get update  # due to new repository
        sudo apt-get install --yes --no-install-recommends -V \
            clang-19 \
            libclang-rt-19-dev \
            llvm-19
        echo /usr/lib/llvm-19/bin >>"${GITHUB_PATH}"

    - name: Install build dependencies
      run: |-
        set -x
        sudo apt-get install --yes --no-install-recommends -V \
            libprotobuf-dev \
            protobuf-compiler

    - name: Build Expat fuzzers
      run: |
        set -x -o pipefail

        type -P clang clang++
        clang --version | head -n1
        clang++ --version | head -n1

        cd expat/
        args=(
            # Build nothing but fuzzers
            -DEXPAT_BUILD_DOCS=OFF
            -DEXPAT_BUILD_EXAMPLES=OFF
            -DEXPAT_BUILD_FUZZERS=ON
            -DEXPAT_BUILD_PKGCONFIG=OFF
            -DEXPAT_BUILD_TESTS=OFF
            -DEXPAT_BUILD_TOOLS=OFF

            # Tune compilation of fuzzers to use Clang with ASan and UBSan
            -DCMAKE_C_COMPILER=clang
            -DCMAKE_CXX_COMPILER=clang++
            -DCMAKE_{C,CXX}_FLAGS='-Wall -Wextra -pedantic -O1 -g -fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -fno-common'
            -DCMAKE_{EXE,MODULE,SHARED}_LINKER_FLAGS='-g -fsanitize=address,undefined'
            -DEXPAT_WARNINGS_AS_ERRORS=ON
        )
        cmake "${args[@]}" -S . -B build
        make -C build VERBOSE=1 -j$(nproc)

        ./build/fuzz/xml_lpm_fuzzer -help=1

    - name: Download fuzzing dictionaries
      run: |-
        set -x
        cd expat/build/

        wget -q https://raw.githubusercontent.com/google/oss-fuzz/refs/heads/master/projects/expat/xml.dict
        wget -q https://raw.githubusercontent.com/google/oss-fuzz/refs/heads/master/projects/expat/xml_UTF_16.dict
        wget -q https://raw.githubusercontent.com/google/oss-fuzz/refs/heads/master/projects/expat/xml_UTF_16BE.dict
        wget -q https://raw.githubusercontent.com/google/oss-fuzz/refs/heads/master/projects/expat/xml_UTF_16LE.dict
        wget -q -O libxml2.dict https://gitlab.gnome.org/GNOME/libxml2/-/raw/HEAD/fuzz/xml.dict
        grep -h '"' *.dict | sort -u > joint.dict

    - name: Download and extract Expat fuzzing corpora
      run: |-
        set -x -o pipefail
        cd expat/build/

        for i in \
                xml_parsebuffer_fuzzer_ISO-8859-1 \
                xml_parsebuffer_fuzzer_US-ASCII \
                xml_parsebuffer_fuzzer_UTF-16 \
                xml_parsebuffer_fuzzer_UTF-16BE \
                xml_parsebuffer_fuzzer_UTF-16LE \
                xml_parsebuffer_fuzzer_UTF-8 \
                xml_parse_fuzzer_ISO-8859-1 \
                xml_parse_fuzzer_US-ASCII \
                xml_parse_fuzzer_UTF-16 \
                xml_parse_fuzzer_UTF-16BE \
                xml_parse_fuzzer_UTF-16LE \
                xml_parse_fuzzer_UTF-8 \
                ; do
            wget -q -O "${i}.zip" "https://storage.googleapis.com/expat-backup.clusterfuzz-external.appspot.com/corpus/libFuzzer/expat_${i}/public.zip"
            unzip -q -o -d corpus_parse_fuzzer_old "${i}.zip"
        done
        echo ../fuzz/expat_fuzzing_corpus_parse_fuzzer_*.tar.xz | xargs -t -r -n1 tar -C corpus_parse_fuzzer_old -x -f
        find corpus_parse_fuzzer_old/ -type f | wc -l

        mkdir corpus_lpm_fuzzer_old
        echo ../fuzz/expat_fuzzing_corpus_lpm_fuzzer_*.tar.xz | xargs -t -r -n1 tar -C corpus_lpm_fuzzer_old -x -f
        find corpus_lpm_fuzzer_old/ -type f | wc -l

    - name: Run fuzzing (300+ minutes)
      run: |
        fuzz_args=(
            -jobs=$(nproc)
            -print_final_stats=1
            -rss_limit_mb=2560  # from OSS-Fuzz
            -timeout=25         # from OSS-Fuzz
            -dict=joint.dict
        )

        set -x -o pipefail
        cd expat/build/

        mkdir corpus_parse_fuzzer
        timeout 255m fuzz/xml_parse_fuzzer_UTF-8 "${fuzz_args[@]}" corpus_parse_fuzzer/ corpus_parse_fuzzer_old/ || true
        for i in fuzz-*.log ; do mv "${i}" "${i%.log}-parse-fuzzer.log" ; done

        mkdir corpus_lpm_fuzzer
        timeout 45m fuzz/xml_lpm_fuzzer "${fuzz_args[@]}" corpus_lpm_fuzzer/ corpus_lpm_fuzzer_old/ || true
        for i in fuzz-*.log ; do mv "${i}" "${i%.log}-lpm-fuzzer.log" ; done

        ls -l fuzz-*.log
        find corpus_parse_fuzzer/ -type f | wc -l
        find corpus_lpm_fuzzer/ -type f | wc -l

        [[ "$({ ls -lh crash-* timeout-* 2>/dev/null || true ; } | tee /dev/stderr | wc -l)" = 0 ]]

    - name: Store fuzzing crash samples
      uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
      with:
        name: expat_fuzzing_crashes_${{ github.sha }}
        path: expat/build/crash-*

    - name: Store fuzzing timeout samples
      uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
      with:
        name: expat_fuzzing_timeouts_${{ github.sha }}
        path: expat/build/timeout-*

    - name: Store fuzzing corpus "corpus_parse_fuzzer"
      uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
      with:
        name: expat_fuzzing_corpus_parse_fuzzer_${{ github.sha }}
        path: expat/build/corpus_parse_fuzzer/*

    - name: Store fuzzing logs
      uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
      with:
        name: expat_fuzzing_logs_${{ github.sha }}
        path: expat/build/fuzz-*.log
        if-no-files-found: error

    - name: Store fuzzing corpus "corpus_lpm_fuzzer"
      uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
      with:
        name: expat_fuzzing_corpus_lpm_fuzzer_${{ github.sha }}
        path: expat/build/corpus_lpm_fuzzer/*
